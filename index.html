<!DOCTYPE html>
<html>
<head>
    <title>Meine Streckenkarte</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body>
    <h2>Meine Route</h2>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([47.7497, 8.7845], 12); // Startkoordinaten (z.B. Hilzingen)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'Map data &copy; OpenStreetMap contributors'
        }).addTo(map);

        // Beispiel für einen markierten Ort oder Startpunkt
        L.marker([47.7497, 8.7845]).addTo(map)
            .bindPopup("Startpunkt: Hilzingen").openPopup();
    </script>
</body>
</html>
